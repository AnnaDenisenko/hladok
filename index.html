<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HladOK — кондиционеры в Белграде и Нови-Саде</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ice:#F4F9FC;
    --frost:#DCEDF6;
    --deep:#0D2B3E;
    --cyan:#1898D5;
    --heat:#E8663C; 
    --cold:#4A7FB5; 
    --white:#FFFFFF;
    --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:'Manrope',system-ui,sans-serif;
    background:var(--ice);
    color:var(--deep);
    line-height:1.6;
  }
  h1,h2,.logo{font-family:'Unbounded',sans-serif}
  h2{font-size:clamp(1.3rem,3vw,1.8rem);font-weight:700;margin-bottom:1.2rem}
  section{max-width:1040px;margin:0 auto;padding:3.5rem 1.25rem}
  a{color:var(--cyan)}
  :focus-visible{outline:3px solid var(--cyan);outline-offset:2px;border-radius:4px}
  .hidden{display:none !important}

  header{
    position:sticky;top:0;z-index:50;
    background:rgba(244,249,252,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--frost);
  }
  .header-inner{
    max-width:1040px;margin:0 auto;padding:.8rem 1.25rem;
    display:flex;align-items:center;justify-content:space-between;gap:1rem;
  }
  .logo{font-size:1.35rem;font-weight:700;color:var(--deep);text-decoration:none;letter-spacing:.02em}
  .logo span{color:var(--cyan)}
  .lang{display:flex;gap:.35rem}
  .lang button{
    font-family:'Manrope',sans-serif;font-weight:600;font-size:.85rem;
    padding:.35rem .7rem;border-radius:999px;border:1px solid var(--frost);
    background:var(--white);color:var(--deep);cursor:pointer;
  }
  .lang button[aria-pressed="true"]{background:var(--deep);color:var(--white);border-color:var(--deep)}

  .hero{text-align:center;padding-top:4.5rem;padding-bottom:4rem}
  .temp-drop{
    display:flex;align-items:baseline;justify-content:center;gap:.7rem;flex-wrap:wrap;
    font-family:'Unbounded',sans-serif;font-weight:700;
    font-size:clamp(1.8rem,7vw,4.2rem);line-height:1;
    margin-bottom:1.6rem;
  }
  .temp-hot{color:var(--heat)}
  .temp-mid{color:var(--cyan)}
  .temp-cold{color:var(--cold)}
  .temp-arrow{font-size:.5em;color:var(--deep);opacity:.55;transform:translateY(-.25em)}
  @media (prefers-reduced-motion:no-preference){
    .temp-mid{animation:chill 1.1s ease-out .3s both}
    @keyframes chill{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:none}}
  }
  .hero h1{font-size:clamp(1.2rem,3.4vw,1.9rem);font-weight:500;max-width:36ch;margin:0 auto .8rem}
  .hero p{max-width:56ch;margin:0 auto 1.8rem;opacity:.85}
  .cta{
    display:inline-block;background:var(--cyan);color:var(--white);
    font-weight:700;text-decoration:none;
    padding:.9rem 2rem;border-radius:999px;
    box-shadow:0 6px 18px rgba(24,152,213,.35);
  }
  .cta:hover{background:#1284BB}

  .services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem}
  .service{
    background:var(--white);border:1px solid var(--frost);border-radius:var(--radius);
    padding:1.4rem;
  }
  .service .ico{font-size:1.6rem;display:block;margin-bottom:.6rem}
  .service h3{font-size:1.02rem;margin-bottom:.4rem}
  .service p{font-size:.92rem;opacity:.85}

  .book{background:var(--deep);border-radius:calc(var(--radius) + 6px);color:var(--white);padding:2.5rem 1.5rem}
  .book h2{color:var(--white)}
  .book .hint{opacity:.75;font-size:.92rem;margin-bottom:1.4rem}
  form{display:grid;grid-template-columns:1fr 1fr;grid-auto-flow:dense;gap:.9rem}
  form label{display:flex;flex-direction:column;gap:.3rem;font-size:.85rem;font-weight:600}
  form input,form select,form textarea{
    font:inherit;padding:.7rem .8rem;border-radius:10px;border:1px solid rgba(255,255,255,.25);
    background:rgba(255,255,255,.08);color:var(--white);
  }
  form option{color:var(--deep)}
  form textarea{resize:vertical;min-height:80px}
  .span2{grid-column:1/-1}
  .send{
    grid-column:1/-1;justify-self:start;
    background:var(--cyan);color:var(--white);border:none;cursor:pointer;
    font-weight:700;font-size:1rem;padding:.85rem 2rem;border-radius:999px;
  }
  .send:hover{background:#1284BB}
  @media (max-width:560px){form{grid-template-columns:1fr}}

  .gallery{position:relative}
  .track{
    position:relative; 
    display:flex;gap:.9rem;overflow-x:auto;
    scroll-snap-type:x mandatory;
    padding-bottom:.6rem;
    -webkit-overflow-scrolling:touch;
  }
  .track::-webkit-scrollbar{height:6px}
  .track::-webkit-scrollbar-thumb{background:var(--frost);border-radius:3px}
  .shot{
    flex:0 0 min(78%,420px);aspect-ratio:4/3;
    scroll-snap-align:center;border-radius:var(--radius);
    overflow:hidden;background:var(--frost);
  }
  .shot img{width:100%;height:100%;object-fit:cover;display:block}
  
  .g-nav{
    position:absolute;top:50%;transform:translateY(-50%);
    width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;
    background:var(--white);color:var(--deep);font-size:1.2rem;
    box-shadow:0 3px 12px rgba(13,43,62,.18);
  }
  .g-prev{left:-8px}.g-next{right:-8px}
  @media (max-width:640px){.g-nav{display:none}}

  .prices table{width:100%;border-collapse:collapse;background:var(--white);border-radius:var(--radius);overflow:hidden;border:1px solid var(--frost)}
  .prices th,.prices td{text-align:left;padding:.85rem 1rem;border-bottom:1px solid var(--frost);font-size:.95rem}
  .prices th{background:var(--frost);font-weight:700}
  .prices tr:last-child td{border-bottom:none}
  .prices td:last-child{white-space:nowrap;font-weight:600}
  .free{color:#1E8E5A}
  .note{font-size:.85rem;opacity:.75;margin-top:.8rem}

  footer{background:var(--deep);color:var(--white);text-align:center;padding:2.2rem 1.25rem;margin-top:2rem}
  footer .logo{color:var(--white)}
  footer p{opacity:.8;font-size:.9rem;margin-top:.5rem}
</style>
</head>

</section>

<section id="works">

    wa_srv:"Service", wa_cons:"Consultation", wa_msg:"Message",
    copied:"The request text was copied. If the message did not appear automatically, paste it into the chat."
  }
};

let lang = "ru";
function applyLang(l){
  lang = l;
  document.documentElement.lang = l;
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key = el.dataset.i18n;
    if(T[l][key] !== undefined) el.textContent = T[l][key];
  });
  document.querySelectorAll(".lang button").forEach(b=>
    b.setAttribute("aria-pressed", b.dataset.lang === l ? "true" : "false"));
}
document.querySelectorAll(".lang button").forEach(b=>
  b.addEventListener("click", ()=>applyLang(b.dataset.lang)));
applyLang("ru");

const citySel = document.getElementById("citySel");
const addrLabel = document.getElementById("addrLabel");
const addrInput = document.getElementById("addrInput");
citySel.addEventListener("change", ()=>{
  const other = citySel.value === "other";
  addrLabel.classList.toggle("hidden", !other);
  addrInput.required = other;
});

document.getElementById("bookForm").addEventListener("submit", e=>{
  e.preventDefault();
  const form = e.target, t = T[lang];
  const f = new FormData(form);
  const cityText = citySel.options[citySel.selectedIndex].textContent;

  const lines = [
    t.wa_lead,
    t.wa_name + ": " + f.get("name"),
    t.wa_phone + ": " + f.get("phone"),
    t.wa_city + ": " + cityText
  ];
  if(citySel.value === "other" && f.get("addr"))
    lines.push(t.wa_addr + ": " + f.get("addr"));
  lines.push(t.wa_srv + ": " + f.get("service"));
  lines.push(t.wa_cons + ": " + f.get("consult"));
  if(f.get("msg")) lines.push(t.wa_msg + ": " + f.get("msg"));

  const text = lines.join("\n");
  const enc = encodeURIComponent(text);
  const channel = f.get("channel");

  if(channel === "whatsapp"){
    window.open("https://wa.me/" + CONTACT.whatsapp + "?text=" + enc, "_blank");
  } else if(channel === "telegram"){
    window.open("https://t.me/" + CONTACT.telegram + "?text=" + enc, "_blank");
  } else if(channel === "sms"){
    window.location.href = "sms:" + CONTACT.phone + "?body=" + enc;
  } else if(channel === "viber"){
    if(navigator.clipboard) navigator.clipboard.writeText(text).catch(()=>{});
    alert(t.copied);
    window.location.href = "viber://chat?number=" + encodeURIComponent(CONTACT.viber);
  }
});

/* ═══ Динамическая загрузка галереи ═══ */
const TOTAL_PHOTOS = 16;
const track = document.getElementById("track");

// Inject photos automatically
for (let i = 1; i <= TOTAL_PHOTOS; i++) {
  const div = document.createElement("div");
  div.className = "shot";
  div.innerHTML = `<img src="photos/photo${i}.jpg" alt="">`;
  track.appendChild(div);
}

// Infinite scroll logic
const originals = Array.from(track.children);
const N = originals.length;

originals.forEach(s => track.appendChild(s.cloneNode(true)));
originals.slice().reverse().forEach(s => track.insertBefore(s.cloneNode(true), track.firstChild));

let setWidth = 0;
function measure(){
  setWidth = track.children[2*N].offsetLeft - track.children[N].offsetLeft;
}

requestAnimationFrame(() => {
  measure();
  track.scrollLeft = setWidth;
});
window.addEventListener("resize", measure);

let isJumping = false;

track.addEventListener("scroll", () => {
  if(isJumping) return;
  const currentScroll = track.scrollLeft;
  
  if(currentScroll < setWidth * 0.5) {
    isJumping = true;
    track.style.scrollSnapType = 'none'; 
    track.scrollLeft = currentScroll + setWidth;
    track.offsetHeight; 
    track.style.scrollSnapType = ''; 
    requestAnimationFrame(() => { isJumping = false; });
  } 
  else if(currentScroll > setWidth * 1.5) {
    isJumping = true;
    track.style.scrollSnapType = 'none'; 
    track.scrollLeft = currentScroll - setWidth;
    track.offsetHeight; 
    track.style.scrollSnapType = ''; 
    requestAnimationFrame(() => { isJumping = false; });
  }
});

const getStep = () => track.children[1].offsetLeft - track.children[0].offsetLeft;
document.querySelector(".g-prev").addEventListener("click", () => track.scrollBy({left: -getStep(), behavior: "smooth"}));
document.querySelector(".g-next").addEventListener("click", () => track.scrollBy({left: getStep(), behavior: "smooth"}));
</script>
</body>
